<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>面接事前テスト管理</title>
  <link rel="stylesheet" href="style.css?v=6">
</head>
<body>
  <section id="auth-screen" class="auth-screen">
    <form id="auth-form" class="auth-card">
      <p class="eyebrow">管理者入口</p>
      <h1>面接事前テスト管理</h1>
      <label>
        パスワード
        <input id="auth-password" type="password" autocomplete="current-password" required>
      </label>
      <button type="submit" class="btn primary">入る</button>
      <p id="auth-error" class="auth-error hidden">パスワードが違います。</p>
    </form>
  </section>

  <div id="admin-app" class="app hidden">
    <aside class="sidebar">
      <header class="brand">
        <h1>面接事前テスト管理</h1>
      </header>

      <form id="interview-form" class="create-form">
        <label>
          面接日
          <input id="interview-date" type="date" required>
        </label>
        <label>
          会社名
          <input id="interview-company" type="text" placeholder="〇〇商事" required>
        </label>
        <label>
          候補者数
          <input id="candidate-count" type="number" min="1" max="80" value="8" required>
        </label>
        <button type="submit" class="btn primary"><i data-lucide="plus"></i>作成</button>
      </form>

      <div class="sidebar-head">
        <span>面接一覧</span>
        <button id="delete-interview" class="icon-btn danger" title="面接を削除"><i data-lucide="trash-2"></i></button>
      </div>
      <div id="interview-list" class="interview-list"></div>
    </aside>

    <main class="main">
      <section class="topbar">
        <div>
          <div class="eyebrow">選択中の面接</div>
          <h2 id="active-title">面接を作成してください</h2>
        </div>
        <div class="actions">
          <button id="open-kraepelin" class="btn"><i data-lucide="external-link"></i>クレペリンURL</button>
          <button id="refresh-kraepelin" class="btn"><i data-lucide="cloud-download"></i>クレペリン取込</button>
          <button id="print-pdf" class="btn"><i data-lucide="printer"></i>PDF</button>
          <button id="export-csv" class="btn"><i data-lucide="download"></i>CSV</button>
          <button id="logout" class="btn"><i data-lucide="log-out"></i>退出</button>
        </div>
      </section>

      <section id="empty-state" class="empty">
        <div>左側で面接を作成すると、候補者一覧と集計表が表示されます。</div>
      </section>

      <section id="workspace" class="workspace hidden">
        <div class="summary-strip">
          <div>
            <span class="metric-label">候補者</span>
            <strong id="metric-candidates">0</strong>
          </div>
          <div>
            <span class="metric-label">クレペリン取得</span>
            <strong id="metric-kraepelin">0</strong>
          </div>
          <div>
            <span class="metric-label">数学入力済</span>
            <strong id="metric-math">0</strong>
          </div>
          <div>
            <span class="metric-label">ピンボード入力</span>
            <strong id="metric-pinboard">0</strong>
          </div>
        </div>

        <div class="candidate-tools">
          <form id="candidate-form" class="inline-form">
            <input id="candidate-no" type="text" placeholder="候補者番号">
            <input id="candidate-name" type="text" placeholder="氏名・メモ">
            <button type="submit" class="btn"><i data-lucide="user-plus"></i>追加</button>
          </form>
          <button id="renumber-candidates" class="btn"><i data-lucide="list-ordered"></i>番号を整える</button>
        </div>

        <div class="table-shell">
          <table id="score-table">
            <thead>
              <tr>
                <th class="sticky-col">総合順位</th>
                <th>No.</th>
                <th>写真</th>
                <th>氏名・メモ</th>
                <th>クレペリン評価</th>
                <th>受験URL</th>
                <th>数学</th>
                <th>ベトナム国語</th>
                <th>日本語単語<br><span class="th-sub">30問</span></th>
                <th>ピン1</th>
                <th>秒</th>
                <th>ピン2</th>
                <th>秒</th>
                <th>ピン順位</th>
                <th>科目順位</th>
                <th>順位合計</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="score-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <section id="print-report" class="print-report"></section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../common/config.js"></script>
  <script src="app.js?v=13"></script>
</body>
</html>
