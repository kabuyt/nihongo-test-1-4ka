  <text x="480" y="108" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="700" fill="#172033">しゅうまつの よてい</text>
  <line x1="480" y1="139" x2="480" y2="485" stroke="#25324a" stroke-width="4"/>
