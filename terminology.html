<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a5276">
<title>専門用語暗記・テスト</title>
<link rel="stylesheet" href="common/style.css">
<style>
.student-bar{background:#fff;border-bottom:2px solid #1a5276;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.student-bar .name{font-size:14px;font-weight:bold;color:#1a5276}
.student-bar .id{font-size:12px;color:#888}
.student-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.student-actions a,.btn-logout{padding:7px 12px;border:1px solid #1a5276;border-radius:8px;background:#fff;color:#1a5276;font-size:12px;text-decoration:none;cursor:pointer}
.btn-logout{border-color:#c0392b;color:#c0392b}
.term-wrap{max-width:980px;margin:18px auto 40px;padding:0 14px}
.term-hero{background:#fff;border-radius:14px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.1);display:flex;justify-content:space-between;gap:14px;align-items:center;margin-bottom:14px}
.term-hero h2{font-size:20px;color:#1a5276;margin-bottom:4px}
.term-hero p{font-size:13px;color:#666;line-height:1.6}
.term-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;min-width:260px}
.term-stats div{background:#eef6fb;border:1px solid #d6e8f3;border-radius:10px;padding:10px;text-align:center}
.term-stats b{display:block;color:#1a5276;font-size:22px}
.term-stats span{font-size:11px;color:#667}
.term-toolbar{background:#fff;border-radius:14px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.term-toolbar select,.term-toolbar input{border:1px solid #ccc;border-radius:8px;padding:10px;font-size:15px;background:#fff}
.term-toolbar input{flex:1;min-width:220px}
.mode-tabs{display:flex;background:#e8edf2;border-radius:9px;padding:3px;gap:3px}
.mode-tabs button{border:0;background:transparent;color:#666;border-radius:7px;padding:9px 12px;font-weight:bold;cursor:pointer}
.mode-tabs button.active{background:#1a5276;color:#fff}
.term-panel{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:14px;align-items:start}
.term-panel.hidden{display:none}
.card-box,.term-list-box,.quiz-box,.quiz-result{background:#fff;border-radius:14px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.flash-card{min-height:330px;border:2px solid #dbe7ef;border-radius:14px;padding:24px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;background:linear-gradient(180deg,#f6fbff,#fff)}
.flash-card.flipped{background:linear-gradient(180deg,#f3fff0,#fff)}
.chip{display:inline-block;align-self:flex-start;background:#e8f5e9;color:#287b36;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:bold;margin-bottom:18px}
.term-main{font-size:38px;line-height:1.3;color:#1a5276;font-weight:bold;word-break:keep-all;overflow-wrap:anywhere}
.term-kana{font-size:18px;color:#666;margin-top:10px}
.term-meaning{font-size:30px;line-height:1.4;color:#1a5276;font-weight:bold}
.flash-card .hint{font-size:13px;color:#999;margin-top:22px}
.card-actions{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:12px}
.card-actions button,.quiz-actions button{padding:11px 16px;border:0;border-radius:9px;font-weight:bold;cursor:pointer}
.btn-sub{background:#eef2f7;color:#1a5276}
.btn-ok{background:#27ae60;color:#fff}
.btn-review{background:#e67e22;color:#fff}
.term-list-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px}
.term-list{max-height:430px;overflow:auto;display:flex;flex-direction:column;gap:6px}
.term-row{border:1px solid #e1e6ec;background:#f8fafc;border-radius:9px;padding:9px;text-align:left;display:flex;justify-content:space-between;gap:8px;cursor:pointer}
.term-row.active{border-color:#1a5276;background:#eef6fb}
.term-row strong,.term-row small{display:block}
.term-row small{color:#666;margin-top:2px}
.status-pill{white-space:nowrap;border-radius:999px;background:#fff;padding:3px 8px;font-size:11px;color:#666}
.status-learned{color:#27ae60}.status-review{color:#e67e22}
.quiz-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
.quiz-head h2{font-size:20px;color:#1a5276;line-height:1.4}
.quiz-score{font-size:22px;font-weight:bold;color:#1a5276}
.quiz-options{display:grid;gap:9px}
.quiz-option{border:1px solid #d7dfe7;background:#f8fafc;border-radius:10px;padding:13px;text-align:left;font-size:15px;cursor:pointer}
.quiz-option.correct{background:#e8f5e9;border-color:#27ae60;color:#1e7b35;font-weight:bold}
.quiz-option.wrong{background:#fff0ee;border-color:#e9aaa2;color:#c0392b}
.quiz-feedback{min-height:24px;margin-top:10px;font-weight:bold;color:#1a5276}
.quiz-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.quiz-result{margin-top:14px;color:#555;line-height:1.7}
.quiz-result strong{display:block;color:#1a5276;font-size:20px}
@media(max-width:720px){
  .term-hero{flex-direction:column;align-items:stretch}
  .term-stats{min-width:0}
  .term-panel{grid-template-columns:1fr}
  .term-main{font-size:30px}
  .term-meaning{font-size:24px}
}
</style>
</head>
<body>
<header>
  <h1>専門用語暗記・確認テスト</h1>
  <p>Từ vựng chuyên ngành - Kinrei</p>
</header>

<div class="student-bar" id="student-bar" style="display:none">
  <div>
    <span class="name" id="student-name"></span>
    <span class="id" id="student-id-display"></span>
  </div>
  <div class="student-actions">
    <a href="index.html">テスト一覧へ</a>
    <button class="btn-logout" onclick="studentLogout()">ログアウト</button>
  </div>
</div>

<main class="term-wrap">
  <section class="term-hero">
    <div>
      <h2>キンレイ専門用語</h2>
      <p>カードで覚えて、4択テストで確認します。間違えた単語は「要復習」に入ります。</p>
    </div>
    <div class="term-stats">
      <div><b id="statLearned">0</b><span>覚えた</span></div>
      <div><b id="statReview">0</b><span>要復習</span></div>
      <div><b id="statRate">0%</b><span>正答率</span></div>
    </div>
  </section>

  <section class="term-toolbar">
    <select id="categoryFilter" aria-label="カテゴリ"><option value="">全カテゴリ</option></select>
    <select id="statusFilter" aria-label="進捗">
      <option value="">全ステータス</option>
      <option value="new">未学習</option>
      <option value="learning">学習中</option>
      <option value="learned">覚えた</option>
      <option value="review">要復習</option>
    </select>
    <input type="search" id="termSearch" placeholder="日本語・カタカナ・ベトナム語で検索">
    <div class="mode-tabs">
      <button type="button" class="active" id="cardModeBtn">暗記カード</button>
      <button type="button" id="testModeBtn">確認テスト</button>
    </div>
  </section>

  <section id="cardPanel" class="term-panel">
    <div class="card-box">
      <div class="flash-card" id="termCard" tabindex="0">
        <span class="chip" id="cardCategory">-</span>
        <div class="term-main" id="cardTerm">読み込み中...</div>
        <div class="term-kana" id="cardKana"></div>
        <div class="term-meaning" id="cardMeaning" style="display:none"></div>
        <p class="hint" id="cardHint">クリックすると意味を表示します</p>
      </div>
      <div class="card-actions">
        <button type="button" class="btn-sub" id="prevCardBtn">前へ</button>
        <button type="button" class="btn-review" id="reviewBtn">要復習</button>
        <button type="button" class="btn-ok" id="learnedBtn">覚えた</button>
        <button type="button" class="btn-sub" id="nextCardBtn">次へ</button>
      </div>
    </div>
    <div class="term-list-box">
      <div class="term-list-head">
        <strong id="visibleCount">0語</strong>
        <button type="button" class="btn-sub" id="resetProgressBtn">リセット</button>
      </div>
      <div id="termList" class="term-list"></div>
    </div>
  </section>

  <section id="testPanel" class="term-panel hidden">
    <div class="quiz-box">
      <div class="quiz-head">
        <h2 id="quizPrompt">問題を開始してください</h2>
        <div class="quiz-score"><span id="quizNow">0</span>/<span id="quizTotal">10</span></div>
      </div>
      <div id="quizOptions" class="quiz-options"></div>
      <div id="quizFeedback" class="quiz-feedback"></div>
      <div class="quiz-actions">
        <button type="button" class="btn-ok" id="startQuizBtn">10問テスト開始</button>
        <button type="button" class="btn-sub" id="nextQuizBtn" disabled>次の問題</button>
      </div>
    </div>
    <div id="quizResult" class="quiz-result hidden"></div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="common/config.js"></script>
<script src="common/auth.js"></script>
<script src="data/kinrei-vocab.js?v=1"></script>
<script src="terminology.js?v=1"></script>
</body>
</html>
