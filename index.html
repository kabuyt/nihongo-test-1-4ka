<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a5276">
<title>みんなの日本語 月間テスト</title>
<link rel="stylesheet" href="common/style.css">
<style>
.test-list{max-width:600px;margin:24px auto;padding:0 16px}
.test-card{display:block;background:#fff;border-radius:12px;padding:18px 20px;margin-bottom:12px;box-shadow:0 2px 6px rgba(0,0,0,.1);text-decoration:none;color:#333;transition:transform .15s,box-shadow .15s}
.test-card:active{transform:scale(.98)}
.test-card.active-card:hover{box-shadow:0 4px 12px rgba(26,82,118,.25);border-left:5px solid #1a5276}
.test-card.active-card{border-left:5px solid #1a5276;cursor:pointer}
.test-card.locked{opacity:.5;pointer-events:none;border-left:5px solid #ccc}
.test-card.submitted{border-left:5px solid #27ae60}
.test-card h2{font-size:16px;color:#1a5276;margin-bottom:4px}
.test-card p{font-size:13px;color:#777}
.test-card .badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;margin-left:8px;font-weight:bold}
.badge-ready{background:#3498db;color:#fff}
.badge-done{background:#27ae60;color:#fff}
.badge-locked{background:#bbb;color:#fff}
.score-line{font-size:12px;color:#555;margin-top:6px}
.score-line span{font-weight:bold;color:#1a5276}
.student-bar{background:#fff;border-bottom:2px solid #1a5276;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.student-bar .name{font-size:14px;font-weight:bold;color:#1a5276}
.student-bar .id{font-size:12px;color:#888}
.btn-logout{padding:6px 14px;border:1px solid #c0392b;border-radius:6px;background:#fff;color:#c0392b;font-size:12px;cursor:pointer}
.btn-logout:hover{background:#c0392b;color:#fff}
.footer-note{text-align:center;font-size:12px;color:#aaa;margin:32px 0 16px}
.loading{text-align:center;padding:40px;color:#888;font-size:14px}
</style>
</head>
<body>

<header>
  <h1>みんなの日本語 第2版　月間テスト</h1>
  <p>Bài kiểm tra hàng tháng - Minna no Nihongo</p>
</header>

<div class="student-bar" id="student-bar" style="display:none">
  <div>
    <span class="name" id="student-name"></span>
    <span class="id" id="student-id-display"></span>
  </div>
  <button class="btn-logout" onclick="studentLogout()">ログアウト</button>
</div>

<div class="test-list" id="test-list">
  <div class="loading" id="loading">読み込み中...</div>
</div>

<div class="footer-note">みんなの日本語 第2版 全50課対応</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="common/config.js"></script>
<script src="common/auth.js"></script>
<script>
(async function() {
  // 認証チェック
  const auth = await checkStudentAuth();
  if (!auth) return;

  const profile = auth.profile;

  // 学生情報バー表示
  const bar = document.getElementById('student-bar');
  bar.style.display = 'flex';
  document.getElementById('student-name').textContent =
    profile.name_katakana || profile.name_romaji || '';
  document.getElementById('student-id-display').textContent =
    '（' + (profile.student_id || '') + '）';

  // テスト一覧取得
  const tests = await getStudentTestList();
  const listEl = document.getElementById('test-list');
  const loadingEl = document.getElementById('loading');
  loadingEl.style.display = 'none';

  if (!tests || tests.length === 0) {
    listEl.innerHTML = '<div class="loading">テストが見つかりません</div>';
    return;
  }

  // セクション表示テキスト
  function sectionText(sections) {
    const map = {goii:'語彙', bunpo:'文法', chokkai:'聴解'};
    if (!sections) return '';
    return sections.map(s => map[s] || s).join('・') + '（各100点）';
  }

  tests.forEach(t => {
    const card = document.createElement('a');

    if (t.is_submitted) {
      // 受験済み
      card.className = 'test-card submitted';
      card.href = '#';
      card.onclick = e => e.preventDefault();
      const scores = [];
      if (t.score_vocab !== null && t.score_vocab !== undefined) scores.push('語彙:' + t.score_vocab);
      if (t.score_grammar !== null && t.score_grammar !== undefined) scores.push('文法:' + t.score_grammar);
      if (t.score_listening !== null && t.score_listening !== undefined) scores.push('聴解:' + t.score_listening);
      card.innerHTML = `
        <h2>${t.display_name} <span class="badge badge-done">提出済み</span></h2>
        <p>${sectionText(t.sections)}</p>
        ${scores.length ? '<div class="score-line">スコア: <span>' + scores.join(' / ') + '</span></div>' : ''}
      `;
    } else if (t.is_accessible) {
      // 受験可能
      card.className = 'test-card active-card';
      card.href = 'test.html?id=' + t.test_id;
      card.innerHTML = `
        <h2>${t.display_name} <span class="badge badge-ready">受験可能</span></h2>
        <p>${sectionText(t.sections)}</p>
      `;
    } else {
      // 未解放
      card.className = 'test-card locked';
      card.href = '#';
      card.onclick = e => e.preventDefault();
      card.innerHTML = `
        <h2>${t.display_name} <span class="badge badge-locked">🔒</span></h2>
        <p>${sectionText(t.sections)}</p>
      `;
    }

    listEl.appendChild(card);
  });
})();
</script>
</body>
</html>
