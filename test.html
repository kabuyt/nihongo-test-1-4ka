<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a5276">
<title>みんなの日本語 月間テスト</title>
<link rel="stylesheet" href="common/style.css?v=20260720-choice-bank-1">
<style>
.confirm-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:20px}
.confirm-overlay[hidden]{display:none}
.confirm-panel{width:min(100%,460px);max-height:calc(100vh - 40px);overflow:auto;background:#fff;border-radius:8px;padding:22px;box-shadow:0 12px 32px rgba(0,0,0,.28)}
.confirm-panel h2{margin:0 0 12px;color:#1a5276;font-size:19px}
.confirm-message{margin:0;color:#333;font-size:14px;line-height:1.7;white-space:pre-line}
.confirm-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
.confirm-actions button{min-height:44px;padding:10px 18px;border-radius:6px;border:1px solid #aaa;background:#fff;font-size:14px;font-weight:bold;cursor:pointer}
.confirm-actions .confirm-submit{border-color:#1a5276;background:#1a5276;color:#fff}
@media(max-width:480px){.confirm-panel{padding:18px}.confirm-actions{flex-direction:column-reverse}.confirm-actions button{width:100%}}
</style>
</head>
<body>

<header>
  <h1 id="test-title">みんなの日本語 第2版　月間テスト</h1>
  <p id="test-subtitle"></p>
</header>

<!-- 受験者情報（自動入力、読み取り専用） -->
<div class="student-info" id="student-info" style="display:none">
  <table>
    <tr>
      <td style="width:50%">名前（カタカナ）：<input type="text" id="name_kata" readonly aria-label="名前 カタカナ"></td>
      <td>クラス：<input type="text" id="class_name" readonly aria-label="クラス"></td>
    </tr>
    <tr>
      <td>名前（ローマ字）：<input type="text" id="name_latin" readonly aria-label="名前 ローマ字"></td>
      <td>受験日：<input type="date" id="test_date" aria-label="受験日"></td>
    </tr>
    <tr>
      <td colspan="2">会社名：<input type="text" id="company" readonly aria-label="会社名"></td>
    </tr>
    <tr>
      <td colspan="2" style="padding-top:6px">
        <label style="font-weight:bold;color:#1a5276">学生ID：<input type="text" id="student_id" readonly style="width:160px;margin-left:8px;background:#f0f0f0"></label>
      </td>
    </tr>
  </table>
</div>

<!-- タブ -->
<div class="tab-bar" id="tab-bar" style="display:none"></div>

<!-- 制限時間 -->
<div id="timer-bar" style="display:none;background:#fff3cd;color:#7a4b00;text-align:center;padding:10px 12px;font-size:14px;font-weight:bold;position:sticky;top:42px;z-index:98;border-bottom:1px solid #f1d58a">
  制限時間: <span id="timer-remaining"></span>
</div>

<!-- 制限時間案内 -->
<div id="time-notice" role="status" aria-live="assertive" style="display:none;background:#fff;color:#c0392b;text-align:center;padding:10px 12px;font-size:14px;font-weight:bold;position:sticky;top:82px;z-index:97;border-bottom:1px solid #f5b7b1"></div>

<!-- カンニング防止バナー -->
<div id="cheat-banner" style="display:none;background:#c0392b;color:#fff;text-align:center;padding:8px 12px;font-size:13px;font-weight:bold;position:sticky;top:42px;z-index:99">
  ⚠ Nghiêm cấm gian lận！Nếu đóng ứng dụng hoặc chuyển tab sẽ bị coi là GIAN LẬN và bị ghi lại.
</div>

<!-- セクションコンテナ（動的生成） -->
<div id="sections-container"></div>

<!-- 終了ボタン -->
<div class="submit-bar" id="finish-btn-wrap" style="display:none">
  <button type="button" class="btn btn-primary" onclick="doFinish()" style="background:#27ae60;box-shadow:0 3px 8px rgba(39,174,96,.4)">✓ Hoàn thành bài kiểm tra</button>
</div>

<!-- 結果表示 -->
<div class="result-box" id="result-box" role="status" aria-live="polite">
  <h2 style="color:#1a5276;margin-bottom:12px">✅ Đã hoàn thành bài kiểm tra</h2>
  <p style="color:#555;margin-bottom:12px;font-size:14px">聴解ページから送信すると、結果は管理ページにのみ保存されます。</p>
  <div id="result-detail"></div>
  <div style="margin-top:20px;text-align:center;border-top:1px solid #ddd;padding-top:16px">
  <button type="button" class="btn btn-send" onclick="doSubmit()" id="send-btn">
      📤 結果を先生に送信する
    </button>
    <div id="send-status" role="status" aria-live="polite" style="margin-top:10px;font-size:14px"></div>
  </div>
</div>

<!-- ローディング -->
<div id="loading" role="status" aria-live="polite" style="text-align:center;padding:60px;color:#888;font-size:16px">
  問題を読み込み中...
</div>

<!-- エラー表示 -->
<div id="error-page" style="display:none;text-align:center;padding:60px">
  <div style="font-size:48px;margin-bottom:16px">🔒</div>
  <h2 style="color:#c0392b" id="error-title">アクセスできません</h2>
  <p style="color:#777;margin-top:8px" id="error-detail"></p>
  <a href="index.html" style="display:inline-block;margin-top:20px;padding:10px 24px;background:#1a5276;color:#fff;border-radius:8px;text-decoration:none">テスト一覧に戻る</a>
</div>

<!-- 送信確認（ブラウザ標準ダイアログを使わない） -->
<div class="confirm-overlay" id="confirm-overlay" hidden>
  <div class="confirm-panel" role="dialog" aria-modal="true" aria-labelledby="confirm-title" aria-describedby="confirm-message">
    <h2 id="confirm-title">提出確認</h2>
    <p class="confirm-message" id="confirm-message"></p>
    <div class="confirm-actions">
      <button type="button" id="confirm-cancel" onclick="resolveConfirmModal(false)">見直す / Xem lại</button>
      <button type="button" class="confirm-submit" id="confirm-submit" onclick="resolveConfirmModal(true)">提出する / Gửi bài</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="common/config.js"></script>
<script src="common/auth.js"></script>
<script src="common/renderer.js?v=20260720-choice-bank-1"></script>
<script src="common/grading.js"></script>
<script>
// ===== テストページ メイン =====
const params = new URLSearchParams(location.search);
const TEST_ID = params.get('id');
window.CURRENT_TEST_ID = TEST_ID;
// 学生受験モードでは巻き戻しを禁止する。まるごと第1・2回は2回、ほかは従来どおり1回まで。
window.ONE_SHOT_AUDIO = true;
window.AUDIO_PLAY_LIMIT = /^marugoto_[12]$/.test(TEST_ID) ? 2 : 1;
const TIME_LIMITS_ENABLED = false;
const SECTION_TIME_LIMIT_SECONDS = 50 * 60;
const SECTION_LABELS = { goii: 'Từ vựng', bunpo: 'Ngữ pháp', chokkai: 'Nghe hiểu' };
let _sections = [];
let _testDef = null;
let _sectionGradingData = {}; // {section: {answer_key, scoring_rules}}
let _isSubmitting = false;
let _timerInterval = null;
let _timerDeadline = 0;
let _timerWarned = false;
let _confirmResolver = null;
let _activeSectionIndex = 0;
let _lockedSections = new Set();
let _allSectionsExpired = false;

function showConfirmModal({ title, message, confirmLabel, cancelLabel }) {
  if (_confirmResolver) _confirmResolver(false);

  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-message').textContent = message;
  document.getElementById('confirm-submit').textContent = confirmLabel || '提出する / Gửi bài';
  document.getElementById('confirm-cancel').textContent = cancelLabel || '見直す / Xem lại';
  document.getElementById('confirm-overlay').hidden = false;
  document.body.style.overflow = 'hidden';

  return new Promise(resolve => {
    _confirmResolver = resolve;
    requestAnimationFrame(() => document.getElementById('confirm-submit').focus());
  });
}

function resolveConfirmModal(result) {
  if (!_confirmResolver) return;
  const resolve = _confirmResolver;
  _confirmResolver = null;
  document.getElementById('confirm-overlay').hidden = true;
  document.body.style.overflow = '';
  resolve(result);
}

document.addEventListener('keydown', event => {
  if (event.key === 'Escape' && _confirmResolver) resolveConfirmModal(false);
});

function updateFinishButtonVisibility(activeSection) {
  document.getElementById('finish-btn-wrap').style.display =
    activeSection === 'chokkai' ? 'block' : 'none';
}

function formatRemainingTime(totalSeconds) {
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;
  return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
}

function getActiveTimedSection() {
  return _sections[_activeSectionIndex] || null;
}

function renderTimer(remainingSeconds) {
  const timerBar = document.getElementById('timer-bar');
  const timerText = document.getElementById('timer-remaining');
  if (!timerBar || !timerText) return;
  if (!TIME_LIMITS_ENABLED) {
    timerBar.style.display = 'none';
    timerText.textContent = '';
    return;
  }

  const activeSection = getActiveTimedSection();
  timerBar.style.display = 'block';
  timerText.textContent = `${SECTION_LABELS[activeSection] || activeSection || 'Test'}: ${formatRemainingTime(remainingSeconds)}`;

  if (remainingSeconds <= 300) {
    timerBar.style.background = '#f8d7da';
    timerBar.style.color = '#842029';
    timerBar.style.borderBottomColor = '#f1aeb5';
  } else {
    timerBar.style.background = '#fff3cd';
    timerBar.style.color = '#7a4b00';
    timerBar.style.borderBottomColor = '#f1d58a';
  }
}

function stopTestTimer() {
  if (_timerInterval) {
    clearInterval(_timerInterval);
    _timerInterval = null;
  }
}

function showTimeNotice(message) {
  if (!TIME_LIMITS_ENABLED) return;
  const notice = document.getElementById('time-notice');
  if (!notice) return;
  notice.textContent = message;
  notice.style.display = 'block';
}

function setSectionLocked(section, locked) {
  const secEl = document.getElementById('tab-' + section);
  const tabBtn = document.getElementById('tab-btn-' + section);
  if (!secEl || !tabBtn) return;

  secEl.dataset.locked = locked ? '1' : '0';
  secEl.querySelectorAll('input, select, textarea, button').forEach(el => {
    if (el.closest('.section-nav')) return;
    el.disabled = locked;
  });
  secEl.querySelectorAll('audio').forEach(audio => {
    if (locked) audio.pause();
    audio.style.pointerEvents = locked ? 'none' : '';
    audio.setAttribute('aria-disabled', locked ? 'true' : 'false');
  });
  tabBtn.classList.toggle('locked', locked);
  tabBtn.disabled = locked;
  tabBtn.setAttribute('aria-disabled', locked ? 'true' : 'false');
}

function updateSectionAccess() {
  if (!TIME_LIMITS_ENABLED) {
    _sections.forEach(sec => {
      const tabBtn = document.getElementById('tab-btn-' + sec);
      if (!tabBtn) return;
      tabBtn.disabled = false;
      tabBtn.classList.remove('locked', 'not-yet-open');
      tabBtn.setAttribute('aria-disabled', 'false');
    });
    return;
  }
  _sections.forEach((sec, index) => {
    const tabBtn = document.getElementById('tab-btn-' + sec);
    if (!tabBtn) return;
    const locked = _lockedSections.has(sec);
    const isFuture = index > _activeSectionIndex;
    tabBtn.disabled = locked || isFuture;
    tabBtn.classList.toggle('locked', locked);
    tabBtn.classList.toggle('not-yet-open', isFuture);
    tabBtn.setAttribute('aria-disabled', locked || isFuture ? 'true' : 'false');
  });
}

function openTimedSection(index) {
  if (index < 0 || index >= _sections.length) return;
  _activeSectionIndex = index;
  updateSectionAccess();
  showTab(_sections[index]);
  startSectionTimer();
}

function closeSectionAndAdvance(reason) {
  if (_isSubmitting || _allSectionsExpired) return;
  const currentSection = getActiveTimedSection();
  if (!currentSection) return;

  if (!TIME_LIMITS_ENABLED) {
    const nextIndex = _activeSectionIndex + 1;
    if (nextIndex < _sections.length) openTimedSection(nextIndex);
    return;
  }

  stopTestTimer();
  _lockedSections.add(currentSection);
  setSectionLocked(currentSection, true);

  const nextIndex = _activeSectionIndex + 1;
  if (nextIndex < _sections.length) {
    showTimeNotice(`${SECTION_LABELS[currentSection] || currentSection} đã hết thời gian. Phần này đã bị khóa. Hãy làm phần tiếp theo.`);
    openTimedSection(nextIndex);
    return;
  }

  _allSectionsExpired = true;
  showTimeNotice('Tất cả các phần đã hết thời gian. Bài làm hiện tại sẽ được tự động gửi.');
  doSubmit({ skipWarnings: true, triggeredByTimeout: true });
}

function tickTestTimer() {
  const remainingSeconds = Math.max(0, Math.ceil((_timerDeadline - Date.now()) / 1000));
  renderTimer(remainingSeconds);

  if (remainingSeconds <= 300 && !_timerWarned) {
    _timerWarned = true;
  }
  if (remainingSeconds <= 0) {
    closeSectionAndAdvance('timeout');
  }
}

function startSectionTimer() {
  stopTestTimer();
  if (!TIME_LIMITS_ENABLED) {
    _timerDeadline = 0;
    const timerBar = document.getElementById('timer-bar');
    const notice = document.getElementById('time-notice');
    if (timerBar) timerBar.style.display = 'none';
    if (notice) notice.style.display = 'none';
    return;
  }
  _timerWarned = false;
  _timerDeadline = Date.now() + (SECTION_TIME_LIMIT_SECONDS * 1000);
  tickTestTimer();
  _timerInterval = setInterval(tickTestTimer, 1000);
}

function resumeTestTimer() {
  if (!TIME_LIMITS_ENABLED) return;
  if (!_timerDeadline || _allSectionsExpired || _isSubmitting) return;
  stopTestTimer();
  tickTestTimer();
  _timerInterval = setInterval(tickTestTimer, 1000);
}

function showError(title, detail) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-page').style.display = 'block';
  document.getElementById('error-title').textContent = title;
  document.getElementById('error-detail').textContent = detail || '';
}

(async function() {
  if (!TEST_ID) {
    showError('テストが指定されていません', 'URLに ?id=test1 のようにテストIDを指定してください。');
    return;
  }

  // 認証チェック
  const auth = await checkStudentAuth();
  if (!auth) return;
  const profile = auth.profile;

  // テスト定義を取得
  const { data: testDef, error: defErr } = await supabase
    .from('test_definitions')
    .select('*')
    .eq('id', TEST_ID)
    .single();

  if (defErr || !testDef) {
    showError('テストが見つかりません', 'テストID: ' + TEST_ID);
    return;
  }
  _testDef = testDef;
  _sections = testDef.sections || ['goii', 'bunpo', 'chokkai'];

  // アクセス権チェック
  const access = await checkTestAccess(TEST_ID);
  if (!access) {
    showError('このテストはまだ受験できません', '前のテストを提出すると自動的に解放されます。');
    return;
  }

  // タイトル設定
  document.title = testDef.display_name + ' - みんなの日本語 月間テスト';
  document.getElementById('test-title').textContent = 'みんなの日本語 第2版　月間テスト（' + testDef.display_name + '）';
  document.getElementById('test-subtitle').textContent = 'Bài kiểm tra hàng tháng';

  // 受験者情報を自動入力
  const infoDiv = document.getElementById('student-info');
  infoDiv.style.display = 'block';
  document.getElementById('name_kata').value = profile.name_katakana || '';
  document.getElementById('name_latin').value = profile.name_romaji || '';
  document.getElementById('class_name').value = profile.class_group || '';
  document.getElementById('company').value = profile.company || '';
  document.getElementById('student_id').value = profile.student_id || '';
  document.getElementById('test_date').value = new Date().toISOString().slice(0, 10);

  // アセットパス設定
  TestRenderer.setBasePath(TEST_ID);

  // タブ生成
  const tabBar = document.getElementById('tab-bar');
  tabBar.style.display = 'flex';
  tabBar.setAttribute('role', 'tablist');
  _sections.forEach((sec, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : ' not-yet-open');
    btn.type = 'button';
    btn.id = 'tab-btn-' + sec;
    btn.setAttribute('role', 'tab');
    btn.setAttribute('aria-controls', 'tab-' + sec);
    btn.setAttribute('aria-selected', i === 0 ? 'true' : 'false');
    btn.setAttribute('aria-disabled', TIME_LIMITS_ENABLED && i !== 0 ? 'true' : 'false');
    btn.disabled = TIME_LIMITS_ENABLED && i !== 0;
    btn.innerHTML = (SECTION_LABELS[sec] || sec) + '<br><small>/100点</small>';
    btn.onclick = () => showTab(sec);
    tabBar.appendChild(btn);
  });

  // セクション読み込み
  const container = document.getElementById('sections-container');
  for (const sec of _sections) {
    const questions = await getTestQuestions(TEST_ID, sec);
    const secDiv = document.createElement('div');
    secDiv.id = 'tab-' + sec;
    secDiv.className = 'section' + (sec === _sections[0] ? ' active' : '');
    secDiv.setAttribute('role', 'tabpanel');
    secDiv.setAttribute('aria-labelledby', 'tab-btn-' + sec);
    if (sec !== _sections[0]) secDiv.hidden = true;
    const sTitle = document.createElement('div');
    sTitle.className = 'section-title';
    const titleMap = { goii: '語彙テスト（Bài kiểm tra từ vựng）', bunpo: '文法テスト（Bài kiểm tra ngữ pháp）', chokkai: '聴解テスト（Bài kiểm tra nghe hiểu）' };
    sTitle.textContent = titleMap[sec] || sec;
    secDiv.appendChild(sTitle);

    // 聴解の再生回数に関する注意書き＋速度コントロールを追加
    if (sec === 'chokkai') {
      const oneShotNotice = document.createElement('div');
      oneShotNotice.style.cssText = 'background:#fdecea;border:1px solid #e74c3c;border-radius:8px;padding:10px 14px;margin-bottom:12px;color:#c0392b;font-weight:bold;font-size:14px';
      if (window.AUDIO_PLAY_LIMIT === 2) {
        oneShotNotice.innerHTML = '<span style="display:block">⚠ 音声は2回だけ聞くことができます。</span><span style="display:block;margin-top:4px">Bạn chỉ có thể nghe mỗi đoạn âm thanh hai lần.</span>';
      } else {
        oneShotNotice.textContent = '⚠ CHÚ Ý: Mỗi đoạn âm thanh CHỈ ĐƯỢC PHÁT MỘT LẦN. Hãy nghe thật kỹ trước khi chuyển sang câu tiếp theo.';
      }
      secDiv.appendChild(oneShotNotice);

      const speedBar = document.createElement('div');
      speedBar.style.cssText = 'background:#fff;border-radius:8px;padding:10px 14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.1);display:flex;align-items:center;gap:10px;flex-wrap:wrap';
      speedBar.innerHTML = `
        <span style="font-size:13px;color:#555">🔊 Tốc độ phát:</span>
        <div style="display:flex;gap:6px">
          <button type="button" onclick="setSpeed(0.75)" style="padding:5px 12px;border-radius:6px;border:1px solid #aaa;background:#fff;font-size:13px;cursor:pointer">×0.75</button>
          <button type="button" onclick="setSpeed(1.0)" style="padding:5px 12px;border-radius:6px;border:2px solid #1a5276;background:#eaf0fb;font-size:13px;cursor:pointer;font-weight:bold">×1.0</button>
          <button type="button" onclick="setSpeed(1.25)" style="padding:5px 12px;border-radius:6px;border:1px solid #aaa;background:#fff;font-size:13px;cursor:pointer">×1.25</button>
        </div>
      `;
      secDiv.appendChild(speedBar);
    }

    if (questions) {
      TestRenderer.renderSection(questions, secDiv);
    } else {
      secDiv.innerHTML += '<p style="color:#c0392b;padding:20px">問題の読み込みに失敗しました。</p>';
    }

    // 次のセクションへボタン（最後のセクション以外）
    const secIdx = _sections.indexOf(sec);
    if (secIdx < _sections.length - 1) {
      const nextBtn = document.createElement('div');
      nextBtn.className = 'section-nav';
      nextBtn.style.cssText = 'text-align:center;margin:28px 0 8px';
      const nextSec = _sections[secIdx + 1];
      nextBtn.innerHTML = `<button type="button" class="btn btn-primary" onclick="closeSectionAndAdvance('manual')" style="font-size:15px;padding:14px 32px">Sang phần ${SECTION_LABELS[nextSec] || nextSec} →</button>`;
      secDiv.appendChild(nextBtn);
    }

    container.appendChild(secDiv);
  }

  // ローディング非表示、終了ボタン表示
  document.getElementById('loading').style.display = 'none';
  updateFinishButtonVisibility(_sections[0]);
  updateSectionAccess();
  startSectionTimer();

  // カンニング防止を有効化
  setupAntiCheat();
})();

// ===== タブ切替 =====
function showTab(name) {
  const requestedIndex = _sections.indexOf(name);
  if (requestedIndex < 0) return;
  if (TIME_LIMITS_ENABLED && (requestedIndex > _activeSectionIndex || _lockedSections.has(name))) return;
  if (!TIME_LIMITS_ENABLED) _activeSectionIndex = requestedIndex;

  document.querySelectorAll('.section').forEach(s => {
    s.classList.remove('active');
    s.hidden = true;
  });
  const target = document.getElementById('tab-' + name);
  if (target) {
    target.classList.add('active');
    target.hidden = false;
  }
  // タブボタンのアクティブ表示
  const btns = document.querySelectorAll('.tab-btn');
  btns.forEach((btn, i) => {
    btn.classList.toggle('active', _sections[i] === name);
    btn.setAttribute('aria-selected', _sections[i] === name ? 'true' : 'false');
  });
  // 最後のタブなら終了ボタン表示
  updateFinishButtonVisibility(name);
  window.scrollTo(0, 0);
}

// ===== 音声速度制御 =====
let _audioSpeed = 1.0;
function setSpeed(rate) {
  _audioSpeed = rate;
  document.querySelectorAll('audio').forEach(a => { a.playbackRate = rate; });
}
document.addEventListener('play', e => {
  if (e.target.tagName === 'AUDIO') e.target.playbackRate = _audioSpeed;
}, true);

// ===== カンニング防止 =====
let _leaveCount = 0;
function setupAntiCheat() {
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      _leaveCount++;
      document.getElementById('cheat-banner').style.display = 'block';
    }
  });
  // 試験中の再読み込み・タブ閉じ・ページ移動をブラウザ標準警告で確認する。
  window.addEventListener('beforeunload', event => {
    if (_isSubmitting) return;
    event.preventDefault();
    event.returnValue = '';
  });
  // 右クリック・コピー防止
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('copy', e => e.preventDefault());
}

// ===== テスト完了 =====
async function doFinish() {
  if (_isSubmitting) return;
  const ok = await showConfirmModal({
    title: 'Hoàn thành bài kiểm tra? / テストを提出しますか',
    message: '押すと解答が管理ページへ送信されます。\n採点結果は受験画面には表示されません。',
    confirmLabel: '提出する / Gửi bài',
    cancelLabel: '見直す / Xem lại'
  });
  if (!ok) return;
  doSubmit({ skipWarnings: false, triggeredByTimeout: false });
}

// ===== 結果送信 =====
async function doSubmit(options = {}) {
  const { skipWarnings = false, triggeredByTimeout = false } = options;
  if (_isSubmitting) return;
  _isSubmitting = true;
  stopTestTimer();
  const btn = document.getElementById('send-btn');
  const status = document.getElementById('send-status');
  const resultBox = document.getElementById('result-box');

  // 全回答を収集
  const answers = {};
  document.querySelectorAll('select, input[type=text], input[type=hidden]').forEach(el => {
    if (el.id && !['student_id', 'name_kata', 'name_latin', 'class_name', 'company', 'test_date'].includes(el.id)) {
      answers[el.id] = el.value || '';
    }
  });
  document.querySelectorAll('input[type=radio]:checked').forEach(el => {
    answers[el.name] = el.value;
  });

  // 未回答チェック（セクション別）
  const secUnans = { goii: 0, bunpo: 0, chokkai: 0 };
  const secTotal = { goii: 0, bunpo: 0, chokkai: 0 };
  const secLabels = { goii: 'Từ vựng（語彙）', bunpo: 'Ngữ pháp（文法）', chokkai: 'Nghe hiểu（聴解）' };
  _sections.forEach(sec => {
    const panel = document.getElementById('tab-' + sec);
    if (!panel) return;

    const standardFields = panel.querySelectorAll('select[id], input[type=text][id], input[type=hidden][id]');
    standardFields.forEach(field => {
      secTotal[sec]++;
      if (!field.value) secUnans[sec]++;
    });

    const radioGroups = new Map();
    panel.querySelectorAll('input[type=radio][name]').forEach(radio => {
      if (!radioGroups.has(radio.name)) radioGroups.set(radio.name, false);
      if (radio.checked) radioGroups.set(radio.name, true);
    });
    radioGroups.forEach(hasAnswer => {
      secTotal[sec]++;
      if (!hasAnswer) secUnans[sec]++;
    });
  });

  // 警告: 未回答が多いセクションがあれば確認
  const warnings = [];
  _sections.forEach(sec => {
    if (secTotal[sec] > 0) {
      const rate = secUnans[sec] / secTotal[sec];
      if (rate >= 0.5) {
        warnings.push(`  ${secLabels[sec]}: ${secUnans[sec]}/${secTotal[sec]} 問 未回答 (${Math.round(rate*100)}%)`);
      }
    }
  });
  if (!skipWarnings && warnings.length > 0) {
    const msg = '⚠ Còn nhiều câu chưa trả lời / 未回答が多いセクションがあります:\n\n' + warnings.join('\n') +
                '\n\nGửi (提出) しますか？\nキャンセル: もう一度見直す';
    const proceed = await showConfirmModal({
      title: '未回答が多くあります / Còn nhiều câu chưa trả lời',
      message: msg,
      confirmLabel: 'このまま提出 / Vẫn gửi bài',
      cancelLabel: '見直す / Xem lại'
    });
    if (!proceed) {
      _isSubmitting = false;
      if (!triggeredByTimeout && !_allSectionsExpired) resumeTestTimer();
      return;
    }
  }

  resultBox.style.display = 'block';
  resultBox.scrollIntoView({ behavior: 'smooth' });
  btn.disabled = true;
  status.textContent = triggeredByTimeout ? '時間切れのため送信中...' : '送信中...';
  status.style.color = '#555';

  const profile = getStudentProfile();
  const testDate = document.getElementById('test_date').value;

  // まるごと総合テストは正解データをブラウザへ渡さず、提出RPC内で採点する。
  // 既存テストは従来どおりクライアント採点を使用する。
  let scores = { score_vocab: null, score_grammar: null, score_listening: null };
  let autoScored = /^marugoto_\d+$/.test(TEST_ID);
  if (!autoScored) {
    try {
      const { data: gradingData, error: gdErr } = await supabase.rpc('get_grading_data', { p_test_id: TEST_ID });
      if (!gdErr && gradingData && typeof window.TestGrading !== 'undefined') {
        scores = window.TestGrading.gradeTest(gradingData, answers);
        autoScored = true;
        console.log('自動採点結果:', scores);
      } else {
        console.warn('grading_data取得失敗 or TestGrading未ロード:', gdErr);
      }
    } catch (e) {
      console.error('採点エラー:', e);
    }
  }

  status.textContent = '送信中...';

  // Supabaseに結果を保存（スコア付き）
  const { error } = await supabase.rpc('submit_test_result', {
    p_test_id: TEST_ID,
    p_test_date: testDate || new Date().toISOString().slice(0, 10),
    p_answers: answers,
    p_score_vocab: scores.score_vocab,
    p_score_grammar: scores.score_grammar,
    p_score_listening: scores.score_listening,
    p_auto_scored: autoScored,
  });

  if (error) {
    console.error('送信エラー:', error);
    if (error.message && (error.message.includes('duplicate') || error.message.includes('Already submitted'))) {
      status.textContent = '⚠ このテストは既に提出済みです。';
      status.style.color = '#e67e22';
    } else {
      status.textContent = '❌ 送信に失敗しました: ' + error.message;
      status.style.color = '#c0392b';
      btn.disabled = false;
      _isSubmitting = false;
      if (!triggeredByTimeout) resumeTestTimer();
    }
    return;
  }

  document.getElementById('result-detail').innerHTML = triggeredByTimeout
    ? '<p style="margin:0;color:#1a5276;font-weight:bold">50分の制限時間に達したため、自動提出しました。</p>'
    : '<p style="margin:0;color:#1a5276;font-weight:bold">送信が完了しました。</p>';
  status.textContent = autoScored
    ? (triggeredByTimeout
      ? '✅ 時間切れで送信完了。採点結果は管理ページにのみ表示されます。'
      : '✅ 送信完了。採点結果は管理ページにのみ表示されます。')
    : (triggeredByTimeout
      ? '✅ 時間切れで送信完了。採点結果は管理ページで確認できます。'
      : '✅ 送信完了。採点結果は管理ページで確認できます。');
  status.style.color = '#27ae60';
  btn.textContent = '送信済み';

  // 5秒後にテスト一覧へ
  setTimeout(() => {
    window.location.href = 'index.html';
  }, 5000);
}
</script>
